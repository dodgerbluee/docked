services:
  docked:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docked
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DATA_DIR=/data
      - TZ=America/Chicago
      - NODE_ENV=development
      # Set DOCKED_URL if runners can't reach this server (e.g. localhost won't work for remote LXCs)
      - DOCKED_URL=http://192.168.20.159:3002
    volumes:
      - ./data:/data
    networks:
      - docked-network

networks:
  docked-network:
    driver: bridge
